<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edu Platform</title>

<style>
/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0f0f1a;
  color: white;
  overflow-x: hidden;
}

/* ===== NAV ===== */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* ===== HERO ===== */
.hero {
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  padding: 80px 60px;
  gap: 40px;
  position: relative;
}

.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 70% 40%, rgba(123,47,190,0.12), transparent 60%);
  pointer-events: none;
}

.hero-left h1 {
  font-size: 48px;
  margin-bottom: 20px;
}

.hero-left p {
  opacity: 0.7;
  margin-bottom: 20px;
}

.btn-hero {
  padding: 12px 24px;
  border: none;
  background: linear-gradient(45deg, #7b2fbe, #ff4ecd);
  color: white;
  border-radius: 10px;
  cursor: pointer;
  transition: all .25s ease;
}

.btn-hero:hover {
  transform: translateY(-2px) scale(1.02);
}

/* ===== RIGHT CARD ===== */
.instructors-showcase {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    0 0 60px rgba(123,47,190,0.18);
  animation: floatSmooth 10s ease-in-out infinite;
}

.instructor-row {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

/* ===== FLOATING ===== */
.floating-card {
  position: absolute;
  padding: 10px 20px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  animation: floatSmooth 7s ease-in-out infinite;
}

.fc-top { top: 20px; right: 20px; }
.fc-bot { bottom: 20px; left: 20px; }

/* ===== CARDS ===== */
.course-card,
.cat-card,
.test-card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin: 20px;
  transition: all .3s cubic-bezier(.4,0,.2,1);
}

.course-card:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* ===== ANIMATION ===== */
.fade-up {
  opacity: 0;
  transform: translateY(40px);
  filter: blur(6px);
  animation: fadeUp 0.9s ease forwards;
}

.fade-up.delay-1 { animation-delay: .2s; }
.fade-up.delay-2 { animation-delay: .4s; }
.fade-up.delay-3 { animation-delay: .6s; }

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}

@keyframes floatSmooth {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>LOGO</div>
  <div>Menu</div>
</nav>

<!-- HERO -->
<section class="hero">

  <!-- LEFT -->
  <div class="hero-left fade-up">
    <h1>เรียนรู้ได้ทุกที่</h1>
    <p>แพลตฟอร์มเรียนออนไลน์ระดับมืออาชีพ</p>
    <button class="btn-hero">เริ่มเลย</button>
  </div>

  <!-- RIGHT -->
  <div class="hero-right fade-up delay-1">

    <div class="instructors-showcase">
      <div class="instructor-row fade-up delay-1">
        <span>John</span><span>UI Design</span>
      </div>
      <div class="instructor-row fade-up delay-2">
        <span>Anna</span><span>Frontend</span>
      </div>
      <div class="instructor-row fade-up delay-3">
        <span>Mike</span><span>Backend</span>
      </div>
    </div>

  </div>

  <!-- FLOAT -->
  <div class="floating-card fc-top">🔥 Popular</div>
  <div class="floating-card fc-bot">⭐ 4.9 Rating</div>

</section>

<!-- COURSE -->
<div class="course-card fade-up">Course 1</div>
<div class="course-card fade-up delay-1">Course 2</div>

<!-- CATEGORY -->
<div class="cat-card fade-up">Category</div>

<!-- TESTIMONIAL -->
<div class="test-card fade-up">Review</div>

</body>
</html>
